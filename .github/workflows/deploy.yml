name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    outputs:
      artifact-name: publish-${{ github.run_id }}
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'
      
      - name: Publish app for Linux
        run: dotnet publish Reminder/ReminderApp.csproj -c Release -r linux-x64 --self-contained false -o ./publish
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish
          path: ./publish
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: publish
          path: ./publish
      
      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 80.66.81.93 >> ~/.ssh/known_hosts 2>&1
          
          echo "Testing connection..."
          timeout 10 ssh root@80.66.81.93 "echo 'Connected'"
          
          echo "Copying files..."
          tar -czf - -C ./publish . | timeout 300 ssh root@80.66.81.93 "tar -xzf - -C /opt/smsapp/"
          
          echo "Restarting service..."
          ssh root@80.66.81.93 "systemctl restart smsapp.service"
          
          echo "Checking status..."
          ssh root@80.66.81.93 "systemctl status smsapp.service --no-pager"