name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'
      
      - name: Publish app for Linux
        run: dotnet publish -c Release -r linux-x64 --self-contained false -o ./publish
      
      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          scp -r -o StrictHostKeyChecking=accept-new ./publish/* root@80.66.81.93:/opt/smsapp/
          ssh -o StrictHostKeyChecking=accept-new root@80.66.81.93 "systemctl restart smsapp.service"
