name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'
      
      - name: Publish app for Linux
        run: dotnet publish Reminder/ReminderApp.csproj -c Release -r linux-x64 --self-contained false -o ./publish
      
      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          # Создаём SSH ключ
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Добавляем сервер в known_hosts
          ssh-keyscan -H 80.66.81.93 >> ~/.ssh/known_hosts 2>&1
          
          # Проверяем подключение
          echo "Testing connection..."
          timeout 10 ssh root@80.66.81.93 "echo 'Connected successfully'"
          
          # Копируем файлы через tar (надёжнее чем scp)
          echo "Copying files..."
          tar -czf - -C ./publish . | timeout 30 ssh root@80.66.81.93 "tar -xzf - -C /opt/smsapp/"
          
          # Перезапускаем сервис
          echo "Restarting service..."
          ssh root@80.66.81.93 "systemctl restart smsapp.service"
          
          # Проверяем статус
          ssh root@80.66.81.93 "systemctl status smsapp.service --no-pager"
