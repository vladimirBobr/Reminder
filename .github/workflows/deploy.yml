name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    outputs:
      artifact-name: publish-${{ github.run_id }}
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'
      
      - name: Publish app for Linux
        run: dotnet publish Reminder/ReminderApp.csproj -c Release -r linux-x64 --self-contained false -o ./publish
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish
          path: ./publish
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: publish
          path: ./publish
      
      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PORT: ${{ vars.VPS_PORT }}
          VPS_USER: ${{ vars.VPS_USER }}
          NTFY_SERVER_URL: ${{ vars.NTFY_SERVER_URL }}
          NTFY_TOPIC: ${{ vars.NTFY_TOPIC }}
          NTFY_USERNAME: ${{ vars.NTFY_USERNAME }}
          NTFY_PASSWORD: ${{ secrets.NTFY_PASSWORD }}          
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>&1
          
          echo "Testing connection..."
          timeout 10 ssh -p $VPS_PORT $VPS_USER@$VPS_HOST "echo 'Connected'"

          echo "Killing old process..."
          ssh -p $VPS_PORT $VPS_USER@$VPS_HOST "pkill -9 -f ReminderApp.dll || true"
          sleep 2          
          
          echo "Copying files..."
          tar -czf - -C ./publish . | timeout 300 ssh -p $VPS_PORT $VPS_USER@$VPS_HOST "tar -xzf - -C /opt/smsapp/"

          echo "Creating systemd service..."
          ssh -p $VPS_PORT $VPS_USER@$VPS_HOST << EOF
          cat > /etc/systemd/system/smsapp.service << 'SERVICE'
          [Unit]
          Description=SMS Reminder App
          After=network.target
          
          [Service]
          Type=simple
          WorkingDirectory=/opt/smsapp
          ExecStart=/usr/bin/dotnet /opt/smsapp/ReminderApp.dll
          Restart=always
          RestartSec=10
          User=root
          Environment=NTFY_SERVER_URL=$NTFY_SERVER_URL
          Environment=NTFY_TOPIC=$NTFY_TOPIC
          Environment=NTFY_USERNAME=$NTFY_USERNAME
          Environment=NTFY_PASSWORD=$NTFY_PASSWORD
          Environment=ADMIN_API_TOKEN=$ADMIN_API_TOKEN
          
          [Install]
          WantedBy=multi-user.target
          SERVICE
          
          systemctl daemon-reload
          systemctl enable smsapp.service
          systemctl restart smsapp.service
          systemctl status smsapp.service --no-pager
          EOF
          
          echo "Restarting service..."
          ssh -p $VPS_PORT $VPS_USER@$VPS_HOST "systemctl restart smsapp.service"
          
          echo "Checking status..."
          ssh -p $VPS_PORT $VPS_USER@$VPS_HOST "systemctl status smsapp.service --no-pager"
